# Build ICU + PyICU wheels for icukit-pyicu.
#
# Versions and source checksums are the single source of truth in pyproject.toml
# ([tool.icukit-pyicu] and project.version); the `config` job reads them and the
# build jobs consume them as outputs. Do not hardcode version strings here.
#
# The final wheel is assembled with standard tooling: setuptools builds the
# icukit_pyicu helper package (correct metadata + license files), then the ICU
# runtime module from the delocate/auditwheel-repaired PyICU wheel is grafted in
# and the tree is repacked with `wheel pack` (which regenerates RECORD). See
# docs/BUILD.md.

name: Build

on:
  workflow_dispatch:
    inputs:
      full:
        description: "Run the full wheel matrix (all OS/Python). Off = 2-wheel smoke."
        type: boolean
        default: false
  push:
    branches: [main]
    tags: ['v*']
  release:
    types: [published]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config:
    name: Resolve config
    runs-on: ubuntu-latest
    outputs:
      pkg_version: ${{ steps.cfg.outputs.pkg_version }}
      icu_version: ${{ steps.cfg.outputs.icu_version }}
      pyicu_version: ${{ steps.cfg.outputs.pyicu_version }}
      icu_sha256: ${{ steps.cfg.outputs.icu_sha256 }}
      pyicu_sha256: ${{ steps.cfg.outputs.pyicu_sha256 }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Read versions and pins from pyproject.toml
        id: cfg
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          with open("pyproject.toml", "rb") as f:
              d = tomllib.load(f)
          k = d["tool"]["icukit-pyicu"]
          print(f"pkg_version={d['project']['version']}")
          print(f"icu_version={k['icu-version']}")
          print(f"pyicu_version={k['pyicu-version']}")
          print(f"icu_sha256={k['icu-sha256']}")
          print(f"pyicu_sha256={k['pyicu-sha256']}")
          PY

      - name: Guard against hardcoded version literals in this workflow
        run: |
          # The workflow must derive versions from pyproject; a bare X.Y or X.Y.Z
          # literal outside a comment is almost certainly a regression.
          if grep -nE '[^#].*"[0-9]+\.[0-9]+(\.[0-9]+)?"' .github/workflows/build.yml \
               | grep -vE 'python-version|actions/|@v[0-9]|ubuntu-|macos-|Wheel-Version|Metadata-Version|MACOSX_DEPLOYMENT_TARGET'; then
            echo "::error::Hardcoded version literal found in build.yml; read it from pyproject.toml instead."
            exit 1
          fi
          echo "OK: no hardcoded version literals."

      - name: Select build matrix (smoke on push, full on tag/release/dispatch)
        id: matrix
        run: |
          FULL='{"include":[
            {"runner":"macos-14","os":"macos-arm64","python":"3.9","auditwheel_plat":""},
            {"runner":"macos-14","os":"macos-arm64","python":"3.10","auditwheel_plat":""},
            {"runner":"macos-14","os":"macos-arm64","python":"3.11","auditwheel_plat":""},
            {"runner":"macos-14","os":"macos-arm64","python":"3.12","auditwheel_plat":""},
            {"runner":"macos-14","os":"macos-arm64","python":"3.13","auditwheel_plat":""},
            {"runner":"macos-14","os":"macos-arm64","python":"3.14","auditwheel_plat":""},
            {"runner":"ubuntu-22.04","os":"linux-x86_64","python":"3.9","auditwheel_plat":"manylinux_2_35_x86_64"},
            {"runner":"ubuntu-22.04","os":"linux-x86_64","python":"3.10","auditwheel_plat":"manylinux_2_35_x86_64"},
            {"runner":"ubuntu-22.04","os":"linux-x86_64","python":"3.11","auditwheel_plat":"manylinux_2_35_x86_64"},
            {"runner":"ubuntu-22.04","os":"linux-x86_64","python":"3.12","auditwheel_plat":"manylinux_2_35_x86_64"},
            {"runner":"ubuntu-22.04","os":"linux-x86_64","python":"3.13","auditwheel_plat":"manylinux_2_35_x86_64"},
            {"runner":"ubuntu-22.04","os":"linux-x86_64","python":"3.14","auditwheel_plat":"manylinux_2_35_x86_64"},
            {"runner":"ubuntu-24.04-arm","os":"linux-aarch64","python":"3.9","auditwheel_plat":"manylinux_2_39_aarch64"},
            {"runner":"ubuntu-24.04-arm","os":"linux-aarch64","python":"3.10","auditwheel_plat":"manylinux_2_39_aarch64"},
            {"runner":"ubuntu-24.04-arm","os":"linux-aarch64","python":"3.11","auditwheel_plat":"manylinux_2_39_aarch64"},
            {"runner":"ubuntu-24.04-arm","os":"linux-aarch64","python":"3.12","auditwheel_plat":"manylinux_2_39_aarch64"},
            {"runner":"ubuntu-24.04-arm","os":"linux-aarch64","python":"3.13","auditwheel_plat":"manylinux_2_39_aarch64"},
            {"runner":"ubuntu-24.04-arm","os":"linux-aarch64","python":"3.14","auditwheel_plat":"manylinux_2_39_aarch64"}
          ]}'
          SMOKE='{"include":[
            {"runner":"macos-14","os":"macos-arm64","python":"3.12","auditwheel_plat":""},
            {"runner":"ubuntu-22.04","os":"linux-x86_64","python":"3.12","auditwheel_plat":"manylinux_2_35_x86_64"}
          ]}'
          # Full matrix only for releases, tag pushes, or an explicit dispatch
          # request; everything else (branch push, plain dispatch) runs the
          # cheap 2-wheel smoke matrix.
          FULL_RUN=false
          case "${{ github.event_name }}" in
            release) FULL_RUN=true ;;
            push) [ "${{ github.ref_type }}" = "tag" ] && FULL_RUN=true ;;
            workflow_dispatch) [ "${{ inputs.full }}" = "true" ] && FULL_RUN=true ;;
          esac
          if [ "$FULL_RUN" = "true" ]; then
            echo "matrix=$(echo "$FULL" | tr -d '\n ')" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=$(echo "$SMOKE" | tr -d '\n ')" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: config
    name: ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.runner }}
    env:
      ICU_VERSION: ${{ needs.config.outputs.icu_version }}
      PYICU_VERSION: ${{ needs.config.outputs.pyicu_version }}
      PKG_VERSION: ${{ needs.config.outputs.pkg_version }}
      ICU_SHA256: ${{ needs.config.outputs.icu_sha256 }}
      PYICU_SHA256: ${{ needs.config.outputs.pyicu_sha256 }}
      # Honest floor for the macOS wheel tag; ICU and PyICU are both built to it.
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.config.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install tools
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y patchelf pkg-config build-essential unzip
          fi
          pip install --upgrade pip setuptools wheel build delocate auditwheel twine check-wheel-contents

      - name: Download and verify ICU source
        run: |
          URL="https://github.com/unicode-org/icu/releases/download/release-${ICU_VERSION}/icu4c-${ICU_VERSION}-sources.tgz"
          echo "Downloading ICU from $URL"
          curl -L "$URL" -o icu.tgz
          echo "${ICU_SHA256}  icu.tgz" | shasum -a 256 -c -
          tar xzf icu.tgz

      - name: Build ICU from source
        run: |
          cd icu/source
          OS_NAME=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          if [ "$OS_NAME" = "macos" ]; then
            # Force the deployment-target floor explicitly: ICU's configure can
            # otherwise pin the build to the host SDK version, which makes the
            # vendored dylibs require a newer macOS than the wheel tag claims and
            # delocate then rejects them. headerpad lets delocate rewrite IDs.
            export CFLAGS="-mmacosx-version-min=${MACOSX_DEPLOYMENT_TARGET}"
            export CXXFLAGS="-mmacosx-version-min=${MACOSX_DEPLOYMENT_TARGET}"
            export LDFLAGS="-mmacosx-version-min=${MACOSX_DEPLOYMENT_TARGET} -Wl,-headerpad_max_install_names"
            ./runConfigureICU MacOSX --prefix=/tmp/icu-dist --enable-static --enable-shared --disable-samples --disable-tests
          else
            ./configure --prefix=/tmp/icu-dist --enable-static --enable-shared --disable-samples --disable-tests
          fi
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          make install
          echo "PKG_CONFIG_PATH=/tmp/icu-dist/lib/pkgconfig" >> $GITHUB_ENV
          echo "ICU_DIST=/tmp/icu-dist" >> $GITHUB_ENV
          echo "/tmp/icu-dist/bin" >> $GITHUB_PATH
          echo "/tmp/icu-dist/sbin" >> $GITHUB_PATH

      - name: Download and verify PyICU source (hash-pinned)
        run: |
          echo "pyicu==${PYICU_VERSION} --hash=sha256:${PYICU_SHA256}" > /tmp/pyicu-req.txt
          pip download -r /tmp/pyicu-req.txt --no-deps --no-binary :all: --require-hashes -d /tmp/src
          cd /tmp/src && tar xzf ./*.tar.gz

      - name: Build PyICU
        env:
          CXXFLAGS: -std=c++17
          CPPFLAGS: -I/tmp/icu-dist/include
        run: |
          set -x
          /tmp/icu-dist/bin/icu-config --ldflags || true
          cd "/tmp/src/pyicu-${PYICU_VERSION}"
          export ICU_VERSION="${ICU_VERSION}"
          if [ "${{ runner.os }}" = "macOS" ]; then
            # macOS: set flags explicitly; -undefined dynamic_lookup is unwanted
            # here, and the extension must target the same floor as the ICU libs.
            export CXXFLAGS="-std=c++17 -mmacosx-version-min=${MACOSX_DEPLOYMENT_TARGET}"
            export LDFLAGS="-L/tmp/icu-dist/lib -licui18n -licuuc -licudata -mmacosx-version-min=${MACOSX_DEPLOYMENT_TARGET} -Wl,-headerpad_max_install_names"
            ARCH=$(uname -m)
            export ARCHFLAGS="-arch ${ARCH}"
            # Force a single-arch platform tag. The runner's Python is a
            # universal2 build, so without this pip tags the wheel universal2
            # while we build arm64-only, and delocate then aborts demanding an
            # x86_64 slice that does not exist.
            export _PYTHON_HOST_PLATFORM="macosx-${MACOSX_DEPLOYMENT_TARGET}-${ARCH}"
          fi
          # Linux: let PyICU's icu-config detection order the flags for GNU ld.
          pip wheel . --no-deps -w /tmp/raw -v

      - name: Bundle ICU into the PyICU wheel (macOS)
        if: runner.os == 'macOS'
        run: |
          export DYLD_LIBRARY_PATH="/tmp/icu-dist/lib"
          ARCH=$(uname -m)
          # Diagnostics: raw wheel tag + minimum-OS of the libraries delocate will
          # graft. These must all agree at MACOSX_DEPLOYMENT_TARGET or delocate
          # aborts. Printed before the repair so a failure is self-explaining.
          echo "raw wheel: $(ls /tmp/raw/)"
          for l in /tmp/icu-dist/lib/libicu*.dylib; do
            echo "  $(basename "$l"): minos=$(vtool -show-build "$l" 2>/dev/null | awk '/minos/{print $2}')"
          done
          mkdir -p /tmp/extchk && (cd /tmp/extchk && unzip -o /tmp/raw/*.whl >/dev/null)
          for so in $(find /tmp/extchk -name '*.so'); do
            echo "  $(basename "$so"): minos=$(vtool -show-build "$so" 2>/dev/null | awk '/minos/{print $2}')"
          done
          delocate-wheel -v --require-archs "${ARCH}" -w /tmp/bundled /tmp/raw/*.whl

      - name: Bundle ICU into the PyICU wheel (Linux)
        if: runner.os == 'Linux'
        run: |
          export LD_LIBRARY_PATH="/tmp/icu-dist/lib:${LD_LIBRARY_PATH:-}"
          auditwheel show /tmp/raw/*.whl || true
          auditwheel repair --plat "${{ matrix.auditwheel_plat }}" -w /tmp/bundled /tmp/raw/*.whl

      - name: Verify macOS deployment target of bundled libraries
        if: runner.os == 'macOS'
        run: |
          # Every vendored dylib must require <= MACOSX_DEPLOYMENT_TARGET so the
          # wheel's platform tag is not a lie (delocate validates this too).
          mkdir -p /tmp/dylibcheck && cd /tmp/dylibcheck && unzip -o /tmp/bundled/*.whl >/dev/null
          fail=0
          for lib in $(find . -name '*.dylib' -o -name '*.so'); do
            minos=$(vtool -show-build "$lib" 2>/dev/null | awk '/minos/{print $2; exit}')
            echo "$lib minos=$minos"
            if [ -n "$minos" ]; then
              major=${minos%%.*}
              if [ "$major" -gt 11 ]; then
                echo "::error::$lib requires macOS $minos > 11.0"; fail=1
              fi
            fi
          done
          [ "$fail" = "0" ]

      - name: Assemble final wheel
        run: |
          set -x
          PYVER=$(python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
          BUNDLED_WHL=$(ls /tmp/bundled/*.whl)

          # Derive the full tag (pyver-abi-plat) from the delocate/auditwheel
          # output rather than hardcoding it. This is the honest platform tag.
          TAG=$(basename "$BUNDLED_WHL" .whl | sed -E 's/^[^-]+-[^-]+-//')
          echo "Derived tag: $TAG"

          # 1. Copy the ICU dev tree into the helper package, then build it with
          #    setuptools so METADATA / entry_points / license files are correct.
          rm -rf icukit_pyicu/include icukit_pyicu/lib icukit_pyicu/bin
          mkdir -p icukit_pyicu/include icukit_pyicu/lib icukit_pyicu/bin
          cp -R /tmp/icu-dist/include/* icukit_pyicu/include/
          cp -R /tmp/icu-dist/lib/*     icukit_pyicu/lib/
          cp -R /tmp/icu-dist/bin/*     icukit_pyicu/bin/
          # Drop static archives: consumers link the shared libs; .a doubles size.
          find icukit_pyicu/lib -name '*.a' -delete

          rm -rf dist build
          python -m build --wheel
          HELPER_WHL=$(ls dist/*.whl)

          # 2. Unpack both wheels into one tree (wheel pack/unpack need existing dirs).
          rm -rf /tmp/work /tmp/pyicu-unpack
          mkdir -p /tmp/work /tmp/pyicu-unpack
          python -m wheel unpack "$HELPER_WHL" -d /tmp/work
          WORK=$(ls -d /tmp/work/*/)
          python -m wheel unpack "$BUNDLED_WHL" -d /tmp/pyicu-unpack
          PYICU_DIR=$(ls -d /tmp/pyicu-unpack/*/)

          # Graft the ICU runtime module and its vendored libraries.
          cp -R "${PYICU_DIR}icu" "$WORK"
          for libs in "${PYICU_DIR}"*.libs; do
            [ -d "$libs" ] && cp -R "$libs" "$WORK"
          done

          # 3. Fix the WHEEL tags (platform wheel, not purelib) and repack.
          python - "$WORK" "$TAG" <<'PY'
          import sys, pathlib
          work, tag = pathlib.Path(sys.argv[1]), sys.argv[2]
          wheel = next(work.glob("*.dist-info/WHEEL"))
          out, saw_tag = [], False
          for line in wheel.read_text().splitlines():
              if line.startswith("Root-Is-Purelib:"):
                  line = "Root-Is-Purelib: false"
              if line.startswith("Tag:"):
                  if saw_tag:
                      continue
                  line, saw_tag = f"Tag: {tag}", True
              out.append(line)
          wheel.write_text("\n".join(out) + "\n")
          PY

          mkdir -p "$GITHUB_WORKSPACE/dist-final"
          python -m wheel pack "$WORK" -d "$GITHUB_WORKSPACE/dist-final"
          ls -la "$GITHUB_WORKSPACE/dist-final"

      - name: Report wheel size
        run: |
          WHL=$(ls "$GITHUB_WORKSPACE"/dist-final/*.whl)
          echo "Compressed wheel: $(du -h "$WHL" | cut -f1)"
          rm -rf /tmp/sz && mkdir -p /tmp/sz && (cd /tmp/sz && unzip -q "$WHL")
          echo "Uncompressed breakdown:"
          du -sh /tmp/sz/icu /tmp/sz/icukit_pyicu 2>/dev/null || true
          du -sh /tmp/sz/icukit_pyicu/lib /tmp/sz/icukit_pyicu/bin /tmp/sz/icukit_pyicu/include 2>/dev/null || true

      - name: Validate wheel
        run: |
          # twine check is the hard gate on metadata. check-wheel-contents is
          # advisory here: it flags the vendored ICU libs / auditwheel *.libs dir,
          # which are expected for this package.
          twine check "$GITHUB_WORKSPACE"/dist-final/*.whl
          check-wheel-contents "$GITHUB_WORKSPACE"/dist-final/*.whl || true

      - name: Test
        run: |
          pip install "$GITHUB_WORKSPACE"/dist-final/*.whl
          rm -rf icu icukit_pyicu   # ensure we import the installed package
          pip install pytest
          python -m pytest tests/ -v

      - name: Smoke test dev linkage (compile and run against bundled ICU)
        run: |
          cat > /tmp/icutest.cpp <<'EOF'
          #include <unicode/uversion.h>
          #include <cstdio>
          int main() {
            UVersionInfo v; u_getVersion(v);
            printf("%d.%d\n", v[0], v[1]);
            return 0;
          }
          EOF
          set -x
          LIB=$(python -c 'import icukit_pyicu; print(icukit_pyicu.get_lib())')
          CFLAGS=$(icukit-config --cflags)
          LIBS=$(icukit-config --libs)
          ls -l "$LIB" | head -40
          if [ "${{ runner.os }}" = "macOS" ]; then
            RPATH="-Wl,-rpath,${LIB}"
          else
            # GNU ld emits DT_RUNPATH by default, which is NOT applied to a
            # library's own transitive dependencies (libicui18n -> libicuuc ->
            # libicudata). --disable-new-dtags forces DT_RPATH, which is, so the
            # program can resolve the whole ICU chain from the bundled lib dir.
            RPATH="-Wl,-rpath,${LIB} -Wl,--disable-new-dtags"
          fi
          c++ -std=c++17 $CFLAGS /tmp/icutest.cpp $LIBS $RPATH -o /tmp/icutest
          if [ "${{ runner.os }}" = "macOS" ]; then
            otool -L /tmp/icutest || true
            # ICU's macOS dylibs carry bare (non-@rpath) install names, so an
            # -rpath link is not enough; the library dir must be on
            # DYLD_LIBRARY_PATH when the program runs.
            OUT=$(DYLD_LIBRARY_PATH="${LIB}" /tmp/icutest)
          else
            ldd /tmp/icutest || true
            OUT=$(/tmp/icutest)
          fi
          echo "Program reported ICU version: $OUT"
          case "$OUT" in
            "${ICU_VERSION}"*) echo "matches ICU_VERSION prefix";;
            *) echo "::error::dev-linkage program reported '$OUT', expected prefix ${ICU_VERSION}"; exit 1;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: dist-final/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
